name: Deploy enablerhq.com to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-enablerhq
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        run: flyctl deploy --remote-only --app enablerhq --wait-timeout=180
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
